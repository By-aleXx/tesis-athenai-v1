<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AthenAI - Login</title>

    <!-- Tailwind CSS v3.4.1 — CDN con fallback local -->
    <script src="https://cdn.tailwindcss.com/3.4.1" crossorigin="anonymous"
        onerror="var s=document.createElement('script');s.src='/static/tailwind.min.js';document.head.appendChild(s);">
    </script>
    <script>
        tailwind.config = {
            darkMode: 'class'
        }
    </script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            font-family: 'Inter', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 1.5rem;
            width: 100%;
            max-width: 450px;
            box-sizing: border-box;
            margin: 0 1rem;
            animation: fadeIn 0.5s ease-out;
        }

        @media (min-width: 480px) {
            .login-card {
                padding: 3rem;
                margin: 0;
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .input-field {
            width: 100%;
            padding: 0.875rem 1rem;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            font-size: 0.95rem;
            transition: all 0.3s;
            background: white;
        }

        .input-field:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn-primary {
            width: 100%;
            padding: 0.875rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .error-message {
            background: #fee2e2;
            color: #991b1b;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            font-size: 0.875rem;
            margin-bottom: 1rem;
            display: none;
        }

        .error-message.show {
            display: block;
            animation: shake 0.5s;
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-10px);
            }

            75% {
                transform: translateX(10px);
            }
        }

        .logo {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            text-align: center;
            color: #6b7280;
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }

        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top: 3px solid white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 0.8s linear infinite;
            display: inline-block;
            margin-left: 10px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .demo-credentials {
            background: #f3f4f6;
            padding: 1rem;
            border-radius: 8px;
            margin-top: 1.5rem;
            font-size: 0.85rem;
            color: #4b5563;
        }

        .demo-credentials strong {
            color: #1f2937;
        }
    </style>
</head>

<body>
    <div class="login-card">
        <div class="logo">🛡️ AthenAI</div>
        <div class="subtitle">Security Intelligence Dashboard</div>

        <div id="errorMessage" class="error-message" style="display:none"></div>

        <form id="loginForm">
            <div style="margin-bottom: 1.25rem;">
                <label for="username" style="display: block; margin-bottom: 0.5rem; font-weight: 500; color: #374151;">
                    Username
                </label>
                <input type="text" id="username" name="username" class="input-field" placeholder="Enter your username"
                    required autocomplete="username">
            </div>

            <div style="margin-bottom: 1.5rem;">
                <label for="password" style="display: block; margin-bottom: 0.5rem; font-weight: 500; color: #374151;">
                    Password
                </label>
                <input type="password" id="password" name="password" class="input-field"
                    placeholder="Enter your password" required autocomplete="current-password">
            </div>

            <button type="submit" id="loginBtn" class="btn-primary">
                Sign In
            </button>
        </form>

    </div>

    <script>
        const API_URL = window.location.origin;

        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        const errorMessage = document.getElementById('errorMessage');

        // Check if already logged in
        const accessToken = localStorage.getItem('access_token');
        if (accessToken) {
            // Verify token is still valid
            verifyToken(accessToken);
        }

        async function verifyToken(token) {
            try {
                const response = await fetch(`${API_URL}/api/auth/me`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (response.ok) {
                    // Token is valid, redirect to dashboard
                    window.location.href = 'index.html';
                } else {
                    // Token is invalid, clear it
                    localStorage.removeItem('access_token');
                    localStorage.removeItem('refresh_token');
                    localStorage.removeItem('user');
                }
            } catch (error) {
                console.error('Error verifying token:', error);
            }
        }

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            // Disable button and show loading
            loginBtn.disabled = true;
            loginBtn.innerHTML = 'Signing In<span class="spinner"></span>';
            errorMessage.classList.remove('show');

            try {
                const response = await fetch(`${API_URL}/api/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok) {
                    // Save tokens; store only non-sensitive claims (no email, last_login)
                    localStorage.setItem('access_token', data.access_token);
                    localStorage.setItem('refresh_token', data.refresh_token);
                    const { username, role, user_id } = data.user || {};
                    localStorage.setItem('user', JSON.stringify({ username, role, user_id }));

                    // Show success and redirect
                    loginBtn.innerHTML = '✓ Success!';
                    loginBtn.style.background = 'linear-gradient(135deg, #10b981 0%, #059669 100%)';

                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 500);
                } else {
                    // Show error
                    showError(data.error || 'Invalid credentials');
                    loginBtn.disabled = false;
                    loginBtn.innerHTML = 'Sign In';
                }
            } catch (error) {
                console.error('Login error:', error);
                showError('Error de conexión. Verifica que el servidor esté activo.');
                loginBtn.disabled = false;
                loginBtn.innerHTML = 'Sign In';
            }
        });

        function showError(message) {
            if (!errorMessage) return;
            errorMessage.textContent = message || 'Credenciales incorrectas. Inténtalo de nuevo.';
            errorMessage.style.display = 'block';
            errorMessage.style.animation = 'shake 0.5s';
            clearTimeout(window._errTimer);
            window._errTimer = setTimeout(() => { errorMessage.style.display = 'none'; }, 8000);
        }
    </script>
</body>

</html>
