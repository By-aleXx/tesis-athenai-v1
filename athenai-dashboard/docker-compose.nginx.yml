version: "3.8"

services:
  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    container_name: athenai-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/sites-available:/etc/nginx/sites-available:ro
      - ./nginx/modsecurity:/etc/nginx/modsecurity:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx-logs:/var/log/nginx
      - modsecurity-logs:/var/log/modsecurity
    networks:
      - athenai-network
    depends_on:
      - backend
    restart: unless-stopped
    environment:
      - TZ=UTC
    extra_hosts:
      - "host.docker.internal:host-gateway"

  backend:
    image: python:3.9-slim
    container_name: athenai-backend
    working_dir: /app
    command: python api_backend.py
    volumes:
      - .:/app
    ports:
      - "5000:5000"
    networks:
      - athenai-network
    restart: unless-stopped
    environment:
      - FLASK_ENV=production
      - AWS_ENDPOINT_URL=http://100.108.127.116:4566
      - REDIS_HOST=100.108.127.116
      - REDIS_PORT=6379

networks:
  athenai-network:
    driver: bridge

volumes:
  nginx-logs:
  modsecurity-logs:
