# Rate Limiting Configuration

# General rate limit - 100 requests per minute
limit_req_zone $binary_remote_addr zone=general:10m rate=100r/m;

# Login endpoint - 5 requests per minute (prevent brute force)
limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;

# API endpoints - 200 requests per minute
limit_req_zone $binary_remote_addr zone=api:10m rate=200r/m;

# Connection limit - max 10 concurrent connections per IP
limit_conn_zone $binary_remote_addr zone=addr:10m;

# Rate limit status code
limit_req_status 429;
limit_conn_status 429;
