# Custom ModSecurity Rules for AthenAI
# Application-specific security rules

# Rule 100001: Block SQL Injection attempts
SecRule ARGS|ARGS_NAMES|REQUEST_COOKIES|REQUEST_COOKIES_NAMES|REQUEST_BODY|REQUEST_HEADERS|XML:/*|XML://@* \
    "@rx (?i:(\s*(union|select|insert|update|delete|drop|create|alter|exec|execute|script|javascript|eval|expression)\s*[\(\=]))" \
    "id:100001,\
     phase:2,\
     block,\
     t:none,t:urlDecodeUni,t:lowercase,\
     msg:'SQL Injection Attack Detected',\
     logdata:'Matched Data: %{MATCHED_VAR} found within %{MATCHED_VAR_NAME}',\
     tag:'application-multi',\
     tag:'language-sql',\
     tag:'platform-multi',\
     tag:'attack-sqli',\
     severity:'CRITICAL',\
     setvar:'tx.anomaly_score_pl1=+%{tx.critical_anomaly_score}',\
     setvar:'tx.sql_injection_score=+1'"

# Rule 100002: Block XSS attempts
SecRule ARGS|ARGS_NAMES|REQUEST_COOKIES|REQUEST_COOKIES_NAMES|REQUEST_BODY|REQUEST_HEADERS|XML:/*|XML://@* \
    "@rx (?i:<script[^>]*>[\s\S]*?</script[^>]*>|javascript:|onerror\s*=|onload\s*=|<iframe|<object|<embed)" \
    "id:100002,\
     phase:2,\
     block,\
     t:none,t:urlDecodeUni,t:htmlEntityDecode,t:lowercase,\
     msg:'XSS Attack Detected',\
     logdata:'Matched Data: %{MATCHED_VAR} found within %{MATCHED_VAR_NAME}',\
     tag:'application-multi',\
     tag:'language-javascript',\
     tag:'platform-multi',\
     tag:'attack-xss',\
     severity:'CRITICAL',\
     setvar:'tx.anomaly_score_pl1=+%{tx.critical_anomaly_score}',\
     setvar:'tx.xss_score=+1'"

# Rule 100003: Block Path Traversal attempts
SecRule ARGS|ARGS_NAMES|REQUEST_COOKIES|REQUEST_COOKIES_NAMES|REQUEST_BODY|REQUEST_HEADERS|REQUEST_URI \
    "@rx (?i:(\.\./|\.\.\\\\|/etc/passwd|/etc/shadow|c:\\\\windows|c:/windows))" \
    "id:100003,\
     phase:2,\
     block,\
     t:none,t:urlDecodeUni,t:lowercase,\
     msg:'Path Traversal Attack Detected',\
     logdata:'Matched Data: %{MATCHED_VAR} found within %{MATCHED_VAR_NAME}',\
     tag:'application-multi',\
     tag:'platform-multi',\
     tag:'attack-lfi',\
     severity:'CRITICAL',\
     setvar:'tx.anomaly_score_pl1=+%{tx.critical_anomaly_score}',\
     setvar:'tx.lfi_score=+1'"

# Rule 100004: Block Command Injection attempts
SecRule ARGS|ARGS_NAMES|REQUEST_COOKIES|REQUEST_COOKIES_NAMES|REQUEST_BODY|REQUEST_HEADERS \
    "@rx (?i:(;|\||`|\$\(|&&|>>|<<|>|<|nc\s|wget\s|curl\s|bash|sh\s|cmd|powershell))" \
    "id:100004,\
     phase:2,\
     block,\
     t:none,t:urlDecodeUni,t:lowercase,\
     msg:'Command Injection Attack Detected',\
     logdata:'Matched Data: %{MATCHED_VAR} found within %{MATCHED_VAR_NAME}',\
     tag:'application-multi',\
     tag:'platform-multi',\
     tag:'attack-rce',\
     severity:'CRITICAL',\
     setvar:'tx.anomaly_score_pl1=+%{tx.critical_anomaly_score}',\
     setvar:'tx.rce_score=+1'"

# Rule 100005: Block suspicious user agents
SecRule REQUEST_HEADERS:User-Agent "@rx (?i:(sqlmap|nikto|nmap|masscan|nessus|openvas|metasploit|burp|w3af|acunetix))" \
    "id:100005,\
     phase:1,\
     block,\
     t:none,t:lowercase,\
     msg:'Malicious Scanner Detected',\
     logdata:'User-Agent: %{MATCHED_VAR}',\
     tag:'application-multi',\
     tag:'platform-multi',\
     tag:'attack-reputation-scanner',\
     severity:'WARNING',\
     setvar:'tx.anomaly_score_pl1=+%{tx.warning_anomaly_score}'"

# Rule 100006: Block file upload attacks
SecRule FILES_TMPNAMES "@rx (?i:\.(php|phtml|php3|php4|php5|phps|pht|phar|asp|aspx|jsp|jspx|sh|bash|bat|cmd|exe|dll)$)" \
    "id:100006,\
     phase:2,\
     block,\
     t:none,t:lowercase,\
     msg:'Malicious File Upload Attempt',\
     logdata:'Filename: %{MATCHED_VAR}',\
     tag:'application-multi',\
     tag:'platform-multi',\
     tag:'attack-file-upload',\
     severity:'CRITICAL',\
     setvar:'tx.anomaly_score_pl1=+%{tx.critical_anomaly_score}'"

# Rule 100007: Rate limiting for brute force protection (already handled by Nginx, but double protection)
SecRule REQUEST_URI "@streq /api/auth/login" \
    "id:100007,\
     phase:1,\
     pass,\
     t:none,\
     msg:'Login endpoint accessed',\
     setvar:'ip.login_attempts=+1',\
     expirevar:'ip.login_attempts=60'"

SecRule IP:LOGIN_ATTEMPTS "@gt 10" \
    "id:100008,\
     phase:1,\
     block,\
     t:none,\
     msg:'Brute Force Attack Detected - Too many login attempts',\
     logdata:'Login attempts: %{IP.LOGIN_ATTEMPTS}',\
     tag:'application-multi',\
     tag:'platform-multi',\
     tag:'attack-brute-force',\
     severity:'WARNING',\
     setvar:'tx.anomaly_score_pl1=+%{tx.warning_anomaly_score}'"

# Rule 100009: Block requests with no User-Agent (often bots)
SecRule &REQUEST_HEADERS:User-Agent "@eq 0" \
    "id:100009,\
     phase:1,\
     block,\
     t:none,\
     msg:'Request with no User-Agent header',\
     tag:'application-multi',\
     tag:'platform-multi',\
     tag:'attack-reputation-scanner',\
     severity:'NOTICE',\
     setvar:'tx.anomaly_score_pl1=+%{tx.notice_anomaly_score}'"

# Rule 100010: Allow legitimate AthenAI API calls
SecRule REQUEST_URI "@beginsWith /api/" \
    "id:100010,\
     phase:1,\
     pass,\
     t:none,\
     msg:'AthenAI API call',\
     ctl:ruleRemoveById=942100,\
     ctl:ruleRemoveById=942200,\
     ctl:ruleRemoveById=942300"
