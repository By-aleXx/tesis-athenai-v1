# ModSecurity Configuration for AthenAI
# Based on OWASP ModSecurity Core Rule Set

# Enable ModSecurity
SecRuleEngine On

# Request body access
SecRequestBodyAccess On
SecRequestBodyLimit 13107200
SecRequestBodyNoFilesLimit 131072
SecRequestBodyLimitAction Reject

# Response body access
SecResponseBodyAccess On
SecResponseBodyMimeType text/plain text/html text/xml application/json
SecResponseBodyLimit 524288
SecResponseBodyLimitAction ProcessPartial

# File upload
SecTmpDir /tmp/
SecDataDir /tmp/
SecUploadDir /tmp/

# Debug log
SecDebugLog /var/log/modsecurity/debug.log
SecDebugLogLevel 0

# Audit log
SecAuditEngine RelevantOnly
SecAuditLogRelevantStatus "^(?:5|4(?!04))"
SecAuditLogParts ABIJDEFHZ
SecAuditLogType Serial
SecAuditLog /var/log/modsecurity/audit.log

# Handling of file uploads
SecUploadKeepFiles Off

# Default actions
SecDefaultAction "phase:1,log,auditlog,pass"
SecDefaultAction "phase:2,log,auditlog,pass"

# Rule IDs
SecRuleRemoveById 920350

# Include OWASP CRS
Include /etc/nginx/modsecurity/crs-setup.conf
Include /etc/nginx/modsecurity/rules/*.conf

# Include custom rules
Include /etc/nginx/modsecurity/custom-rules.conf
